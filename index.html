<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍Explorer log</h1>
            <p>Registre suas aventuras!!</p>
            </header>
    
        <div class="form-card">
            <input type="text" id="ipt-url" placeholder="URL da imagem">
            <input type="text" id="ipt-title" placeholder="Onde você estava?">
            <input type="text" id="ipt-desc" placeholder="Conte um pouco sobre a aventura...">
            <div class="row">
                <input type="number" id="ipt-lat" placeholder="Latitude">
                <input type="number" id="ipt-lon" placeholder="Longitude">
                </div>
            <button id="btn-adicionar">Adicionar ao Mural</button>
            </div>
            <div id="galeria" class="grid-galeria">
            <!--Os cards serão injetados aqui-->
        </div>
        </div>
    </div>
        <script src="script/script.js"></script>
</body>
</html>
